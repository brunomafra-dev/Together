version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "react"
          - "react-dom"
          - "react-router"
      supabase:
        patterns:
          - "@supabase/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
